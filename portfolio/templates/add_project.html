<!DOCTYPE html>
<html>
<head>

<title>Add Project</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h2 class="mt-4">Add Project</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input type="text" name="title" placeholder="Title" class="form-control mt-2">

<textarea name="description" placeholder="Description" class="form-control mt-2"></textarea>

<input type="text" name="location" placeholder="Location" class="form-control mt-2">

<input type="number" name="year" placeholder="Year" class="form-control mt-2">

<select name="category" class="form-control mt-2">

{% for category in categories %}

<option value="{{ category.id }}">{{ category.name }}</option>

{% endfor %}

</select>

<label class="mt-3">Cover Image</label>

<input type="file" name="cover_image" class="form-control">

<label class="mt-3">Gallery Images</label>

<input type="file" name="gallery" multiple class="form-control">

<button class="btn btn-dark mt-3">Upload Project</button>

</form>

</div>

</body>
</html>
