<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6f9;
font-family:Arial;
}

.sidebar{
height:100vh;
background:#212529;
color:white;
padding:20px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
margin:10px 0;
}

.sidebar a:hover{
color:#0d6efd;
}

.content{
padding:30px;
}

.table img{
width:80px;
height:60px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="container-fluid">

<div class="row">

<div class="col-md-2 sidebar">

<h4>Dashboard</h4>

<a href="/d/">Projects</a>
<a href="/a/">Add Project</a>
<a href="/e/">Edit Profile</a>
<a href="/o/">Logout</a>

</div>

<div class="col-md-10 content">

<h2>Projects</h2>

<table class="table table-striped">

<tr>

<th>Image</th>
<th>Title</th>
<th>Year</th>
<th>Actions</th>

</tr>

{% for project in projects %}

<tr>

<td>

<img src="{{ project.cover_image.url }}">

</td>

<td>{{ project.title }}</td>

<td>{{ project.year }}</td>

<td>

<a href="/edit/{{ project.id }}/" class="btn btn-warning btn-sm">Edit</a>

<a href="/x/{{ project.id }}/" class="btn btn-danger btn-sm">Delete</a>

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</div>

</body>
</html>
