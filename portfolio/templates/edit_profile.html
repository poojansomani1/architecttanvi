<!DOCTYPE html>
<html>
<head>

<title>Edit Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

<h2 class="mt-4">Edit Profile</h2>

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

<input type="text" name="name" value="{{ profile.name }}" class="form-control mt-2">

<textarea name="bio" class="form-control mt-2">{{ profile.bio }}</textarea>

<input type="email" name="email" value="{{ profile.email }}" class="form-control mt-2">

<input type="text" name="phone" value="{{ profile.phone }}" class="form-control mt-2">

<label class="mt-3">Profile Image</label>

<input type="file" name="profile_image" class="form-control">

<button class="btn btn-dark mt-3">Update Profile</button>

</form>

</div>

</body>
</html>
