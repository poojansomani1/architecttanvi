<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

<div class="row justify-content-center">

<div class="col-md-4">

<h3 class="text-center mt-5">Admin Login</h3>

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" class="form-control mt-3">

<input type="password" name="password" placeholder="Password" class="form-control mt-3">

<button class="btn btn-dark w-100 mt-3">Login</button>

</form>

</div>

</div>

</div>

</body>
</html>
